# yaml-language-server: $schema=https://raw.githubusercontent.com/RedHatInsights/frontend-components/refs/heads/master/packages/config-utils/src/feo/spec/frontend-crd.schema.json
apiVersion: v1
kind: Template
metadata:
  name: migration-advisor
objects:
  - apiVersion: cloud.redhat.com/v1alpha1
    kind: Frontend
    metadata:
      name: migration-advisor
    spec:
      API:
        versions:
          - v1
      envName: ${ENV_NAME}
      title: Openshift Migration Advisor
      deploymentRepo: https://gitlab.cee.redhat.com/assisted-migration/migration-assessment-app
      frontend:
        paths:
          - /apps/migration-advisor
      image: ${IMAGE}:${IMAGE_TAG}
      module:
        manifestLocation: "/apps/migration-advisor/fed-mods.json"
        modules:
          - id: "migration-advisor"
            module: "./RootApp"
            routes:
              - pathname: /openshift/migration-advisor
          - id: "migration-assessment"
            module: "./RootApp"
            routes:
              - pathname: /openshift/migration-assessment
      feoConfigEnabled: true
      searchEntries:
        - id: migration-advisor-assessments
          title: Migration Advisor - Assessments
          href: /openshift/migration-advisor/assessments
          description: View and manage VMware to OpenShift migration assessments.
          alt_title:
            - migration assessment
            - vmware migration
            - openshift migration
            - migration planner
        - id: migration-advisor-create-assessment
          title: Migration Advisor - Create Assessment
          href: /openshift/migration-advisor/assessments/create
          description: Create a new VMware to OpenShift migration assessment.
          alt_title:
            - new assessment
            - start migration
            - migration wizard
        - id: migration-advisor-environments
          title: Migration Advisor - Environments
          href: /openshift/migration-advisor/environments
          description: Manage discovery environments and data collection sources for migration planning.
          alt_title:
            - migration environment
            - discovery source
            - migration data collection
        - id: migration-advisor-example-report
          title: Migration Advisor - Example Report
          href: /openshift/migration-advisor/assessments/example-report
          description: View a sample migration assessment report to understand what insights the tool provides.
          alt_title:
            - sample report
            - migration report example
            - assessment results

parameters:
  - name: ENV_NAME
    required: true
  - name: IMAGE_TAG
  - name: IMAGE
    required: true
